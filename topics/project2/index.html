<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sonic Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* center the game canvas on the page */
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  </style>
</head>
<body>

  <!-- load phaser from cdn -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>

  <!-- load scenes -->
  <script src="js/TitleScene.js"></script>
  <script src="js/PlayScene.js"></script>

  <script>
    // phaser game config
    const config = {
      type: Phaser.AUTO,
      width: 800,
      height: 400,
      backgroundColor: '#5ac8f5',
      physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
      },
      scene: [TitleScene, PlayScene]
    };

    // start the game
    const game = new Phaser.Game(config);
  </script>

</body>
</html>
